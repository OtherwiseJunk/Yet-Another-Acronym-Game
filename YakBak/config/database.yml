# PostgreSQL. Versions 9.3 and up are supported.
#   gem install pg
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

  # The following variables are used for local development and testing.
  # You may need to adjust them for your local PostgreSQL setup.
  # In production (Docker), the DATABASE_URL will be used instead.
  host: db
  username: postgres

development:
  <<: *default
  database: YakBak_development
  password: postgres

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: YakBak_test
  password: postgres

production:
  <<: *default
  # The DATABASE_URL environment variable is used in production.
  # It's set in your docker-compose.yml file.
  url: <%= ENV['DATABASE_URL'] %>
  password: <%= ENV['POSTGRES_PASSWORD'] %>
