name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-yak:
    name: Yak linter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Run ESLint
        working-directory: Yak
        run: npx eslint .

  test-yak:
    name: Yak unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: Yak
        run: npm ci

      - name: Run Vitest
        working-directory: Yak
        run: npx vitest --run --reporter dot

      - name: Upload Vitest artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results-yak
          path: Yak/test-results

  lint-yakbak:
    name: YakBak linter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.3.8']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: 'YakBak'

      - name: Run RuboCop
        working-directory: YakBak
        run: bundle exec rubocop
